<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI JM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <nav class="sidebar">
        <div class="logo-container">
            <img src="https://github.com/Eduardabrito044-ui/ouvidoriaescola/raw/main/logo.png" class="school-logo">
            <h1>CETI JM</h1>
        </div>
        <div class="nav-buttons">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Ideias</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">📝 Feedback</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-cronograma" onclick="mudarAba('cronograma')">📅 Agenda</button>
            <a href="https://wa.me/5589981259467" class="direct-link">📱 WhatsApp</a>
        </div>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div id="feed-forum" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-btn" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div id="feed-mural" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-ideia" placeholder="Sua ideia de ouro...">
                    <button class="send-btn" onclick="salvarIdeia()">Sugerir</button>
                </div>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="content-scroll p-20">
                <h2 style="color:var(--sec)">📝 Feedback Privado</h2>
                <p>O que você escrever aqui vai direto para a Eduarda.</p>
                <textarea id="texto-feedback" placeholder="O que a escola deve melhorar?" style="width:100%; height:150px; margin-top:15px; border-radius:15px; padding:10px;"></textarea>
                <button class="send-btn" style="background:var(--sec); color:white; width:100%; margin-top:10px; padding:15px; border-radius:15px;" onclick="enviarFeedback()">Enviar para a Escola</button>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="emoji-grid-especial">
                <div class="emoji-item" onclick="votarHumor('😊')"><span>😊</span><p>Feliz</p></div>
                <div class="emoji-item" onclick="votarHumor('😴')"><span>😴</span><p>Cansado</p></div>
                <div class="emoji-item" onclick="votarHumor('😰')"><span>😰</span><p>Ansioso</p></div>
                <div class="emoji-item" onclick="votarHumor('😡')"><span>😡</span><p>Estressado</p></div>
            </div>
        </section>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
