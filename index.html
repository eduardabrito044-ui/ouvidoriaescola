<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ouvidoria Escolar | Portal Interativo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="background-fixo"></div>

  <nav class="sidebar glass">
    <h2>Painel Escolar</h2>
    <button onclick="mudarAba('forum')">💬 Fórum</button>
    <button onclick="mudarAba('mural')">💡 Mural</button>
    <button onclick="mudarAba('humor')">🎭 Clima</button>
    <button onclick="mudarAba('feedback')">🏫 Opinião</button>
    <button onclick="mudarAba('contatos')">📞 Contato</button>
  </nav>

  <main class="conteudo">

    <!-- CHAT -->
    <section id="forum" class="aba active glass">
      <h2>💬 Chat da Escola</h2>

      <div id="chat-box">
        <div id="feed-forum"></div>

        <div class="input-box">
          <input type="text" id="input-msg" placeholder="Digite sua mensagem...">
          <button onclick="salvarMensagem()">➤</button>
        </div>
      </div>
    </section>

    <!-- MURAL -->
    <section id="mural" class="aba glass">
      <h2>💡 Mural de Ideias</h2>
      <div id="feed-mural"></div>

      <div class="input-box">
        <input type="text" id="input-ideia" placeholder="Sua ideia...">
        <button onclick="salvarIdeia()">Publicar</button>
      </div>
    </section>

    <!-- HUMOR -->
    <section id="humor" class="aba glass text-center">
      <h2>Clima da Escola</h2>
      <div class="emoji-seletor">
        <button onclick="votarEmoji('feliz')">😊 <span id="v-feliz">0</span></button>
        <button onclick="votarEmoji('triste')">😢 <span id="v-triste">0</span></button>
        <button onclick="votarEmoji('cansado')">😴 <span id="v-cansado">0</span></button>
        <button onclick="votarEmoji('bravo')">😡 <span id="v-bravo">0</span></button>
      </div>
    </section>

    <!-- FEEDBACK -->
    <section id="feedback" class="aba glass">
      <h2>🏫 Opinião sobre a escola</h2>
      <textarea id="feedback-texto" placeholder="Escreva aqui..."></textarea>
      <button onclick="salvarFeedbackEscola()">Enviar</button>
    </section>

    <!-- CONTATO -->
    <section id="contatos" class="aba glass">
      <h2>📞 Contato</h2>
      <a href="https://wa.me/5589981259467" target="_blank">WhatsApp</a>
    </section>

  </main>

  <script type="module" src="script.js"></script>
</body>
                                                                      </html>
