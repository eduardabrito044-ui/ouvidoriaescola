<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI José Marques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode"> 
    <nav class="sidebar">
        <div class="logo-container">
            <img src="logo.png" alt="Logo Escola" class="school-logo">
            <h1>Ouvidoria</h1>
        </div>
        <div class="nav-buttons">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Mural</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Avisos</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-cronograma" onclick="mudarAba('cronograma')">📅 Agenda</button>
            <a href="https://wa.me/5589981259467" target="_blank" class="btn-direct-link">📞 WhatsApp</a>
            <a href="mailto:eduardabrito044@gmail.com" class="btn-direct-link">✉️ E-mail</a>
        </div>
        <button id="theme-toggle" onclick="toggleTheme()">🌓 Alternar Tema</button>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="header-insta">
                <div class="logo-circle"><img src="logo.png"></div>
                <div class="header-info">
                    <h2>Direct dos Alunos</h2>
                    <span>Ativo agora</span>
                </div>
            </div>
            <div id="feed-forum" class="feed"></div>
            <div class="footer-input">
                <div id="reply-preview" class="reply-box">
                    <div class="reply-details">
                        <small id="reply-user"></small>
                        <p id="reply-text"></p>
                    </div>
                    <button onclick="cancelarResposta()">✕</button>
                </div>
                <div class="input-container">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-btn" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div class="header-insta"><h2>💡 Mural de Ideias</h2></div>
            <div id="feed-mural" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-ideia" placeholder="Sua sugestão...">
                    <button class="send-btn" onclick="salvarIdeia()">Sugerir</button>
                </div>
            </div>
        </section>

        <section id="avisos" class="aba">
            <div class="header-insta"><h2>📢 Avisos Oficiais</h2></div>
            <div id="feed-avisos" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-aviso" placeholder="Escrever aviso (Chave)...">
                    <button class="send-btn" onclick="salvarAviso()">Postar</button>
                </div>
            </div>
        </section>

        <section id="cronograma" class="aba">
            <div class="header-insta"><h2>📅 Agenda Escolar</h2></div>
            <div class="p-20">
                <h3 class="titulo-secao">🏆 Olimpíadas (CETI JM)</h3>
                <div class="item-evento olympics">🥇 01/05 - Abertura das Olimpíadas</div>
                <div class="item-evento olympics">🏅 05/05 - Competições e Jogos</div>
                <h3 class="titulo-secao">📅 Eventos Gerais</h3>
                <div class="item-evento school-event">20/05 - Feira de Empreendedorismo</div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="header-insta"><h2>🎭 Como você está?</h2></div>
            <div class="emoji-grid">
                <button onclick="votarHumor('😊')">😊</button>
                <button onclick="votarHumor('😴')">😴</button>
                <button onclick="votarHumor('🤓')">🤓</button>
                <button onclick="votarHumor('🤩')">🤩</button>
                <button onclick="votarHumor('😡')">😡</button>
                <button onclick="votarHumor('😎')">😎</button>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
