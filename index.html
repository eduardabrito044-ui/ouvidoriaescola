<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Ouvidoria - CETI JM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <nav class="top-menu">
        <div class="menu-scroll">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Mural</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Alertas</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-agenda" onclick="mudarAba('agenda')">📅 Agenda</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">🏫 Opinião</button>
            <button id="btn-contatos" onclick="mudarAba('contatos')">📞 Contatos</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="header-escola-fixo">
            <img src="logo.png" class="logo-fixa" onerror="this.src='https://via.placeholder.com/50?text=JM'">
            <div class="info-header">
                <h2>CETI José Marques</h2>
                <span class="status-online">● Sistema Ativo</span>
            </div>
        </header>

        <section id="forum" class="aba active">
            <div id="feed-forum" class="feed"></div>
            <div class="footer-input">
                <div class="input-wrapper">
                    <input type="text" id="input-msg" placeholder="Enviar direct...">
                    <button class="send-btn" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div id="feed-mural" class="feed"></div>
            <div class="footer-input">
                <div class="input-wrapper">
                    <input type="text" id="input-mural" placeholder="Sua ideia para a escola...">
                    <button class="send-btn" onclick="salvarMural()">Postar</button>
                </div>
            </div>
        </section>

        <section id="avisos" class="aba">
            <div id="feed-avisos" class="feed"></div>
            <div class="footer-input">
                <div class="input-wrapper">
                    <input type="text" id="input-aviso" placeholder="Senha para Alertas...">
                    <button class="send-btn" onclick="salvarAviso()">Postar</button>
                </div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="emoji-grid">
                <div class="emoji-item" onclick="votarHumor('Ansioso')"><span>😰</span><p>Ansioso</p><small>Inquieto</small></div>
                <div class="emoji-item" onclick="votarHumor('Feliz')"><span>😊</span><p>Feliz</p><small>Dia ótimo</small></div>
                <div class="emoji-item" onclick="votarHumor('Triste')"><span>😢</span><p>Triste</p><small>Apoio</small></div>
                <div class="emoji-item" onclick="votarHumor('Focado')"><span>🤯</span><p>Focado</p><small>Estudos</small></div>
            </div>
        </section>

        <section id="agenda" class="aba">
            <div id="feed-agenda" class="feed"></div>
        </section>

        <section id="feedback" class="aba">
            <div class="p-20">
                <textarea id="texto-feedback" placeholder="O que podemos melhorar?"></textarea>
                <button class="btn-acao" onclick="enviarFeedback()">Enviar Feedback</button>
            </div>
        </section>

        <section id="contatos" class="aba">
            <div class="p-20">
                <div class="card-contato" onclick="window.open('https://wa.me/5589981259467')">
                    <strong>WhatsApp Ouvidoria</strong><p>(89) 98125-9467</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast">Enviado com sucesso! ✓</div>
    <button class="fab-theme" onclick="toggleTheme()">🌓</button>
    <script type="module" src="script.js"></script>
</body>
</html>
