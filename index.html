<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI JM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <nav class="top-menu">
        <div class="menu-scroll">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Ideias</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Avisos</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">📩 Opinião</button>
            <button id="btn-cronograma" onclick="mudarAba('cronograma')">📅 Agenda</button>
            <button id="btn-contatos" onclick="mudarAba('contatos')">📱 Contatos</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="header-fixo"><h2>Direct dos Alunos</h2></div>
            <div id="feed-forum" class="feed"></div>
            <div class="footer-input">
                <div id="reply-preview" class="reply-container">
                    <div class="reply-content"><small id="reply-user"></small><p id="reply-text"></p></div>
                    <button onclick="cancelarResposta()">✕</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-btn" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div class="header-fixo"><h2>💡 Mural de Ideias</h2></div>
            <div id="feed-mural" class="feed"></div>
            <div class="footer-input">
                <div class="input-wrapper">
                    <input type="text" id="input-ideia" placeholder="Sugira algo divertido...">
                    <button class="send-btn" onclick="salvarIdeia()">Postar</button>
                </div>
            </div>
        </section>

        <section id="cronograma" class="aba">
            <div class="header-fixo"><h2>Cronograma Escolar</h2></div>
            <div class="content-scroll">
                <h3 class="titulo-secao">🏆 Olimpíadas (CETI José Marques)</h3>
                <div class="lista-eventos">
                    <div class="item-eventos olympics">01/05 - Abertura das Olimpíadas</div>
                    <div class="item-eventos olympics">05/05 - Competições e Jogos</div>
                </div>
                <h3 class="titulo-secao">📅 Eventos da Escola</h3>
                <div class="lista-eventos">
                    <div class="item-eventos">15/05 - Reunião de Pais e Mestres</div>
                    <div class="item-eventos">20/05 - Feira de Empreendedorismo</div>
                </div>
            </div>
        </section>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
