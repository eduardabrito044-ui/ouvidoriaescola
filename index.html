<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI JM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <header class="top-nav">
        <div class="brand">
            <img src="https://github.com/Eduardabrito044-ui/ouvidoriaescola/raw/main/logo.png" alt="Logo" class="mini-logo">
            <span class="school-name">CETI JM</span>
        </div>
        <nav class="nav-scroll">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">Ideias</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">Humor</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">Opinião</button>
            <button id="btn-contatos" onclick="mudarAba('contatos')">Contato</button>
        </nav>
    </header>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div id="feed-forum" class="feed"></div>
            <div class="footer-fixo">
                <div class="input-box">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-icon" onclick="salvarMensagem()">➤</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div id="feed-mural" class="feed"></div>
            <div class="footer-fixo">
                <div class="input-box">
                    <input type="text" id="input-ideia" placeholder="Sua ideia de ouro...">
                    <button class="send-icon" onclick="salvarIdeia()">+</button>
                </div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="humor-container">
                <div class="emoji-grid">
                    <button onclick="enviarSentimento('Radiante', '😁')">😁<span>Radiante</span></button>
                    <button onclick="enviarSentimento('Bem', '🙂')">🙂<span>Bem</span></button>
                    <button onclick="enviarSentimento('Cansado', '😴')">😴<span>Cansado</span></button>
                    <button onclick="enviarSentimento('Triste', '😔')">😔<span>Triste</span></button>
                    <button onclick="enviarSentimento('Ansioso', '😰')">😰<span>Ansioso</span></button>
                    <button onclick="enviarSentimento('Bravo', '😤')">😤<span>Bravo</span></button>
                </div>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="p-20">
                <textarea id="texto-feedback" placeholder="Escreva aqui..."></textarea>
                <button class="btn-enviar" onclick="enviarFeedback()">Enviar</button>
            </div>
        </section>

        <section id="contatos" class="aba">
            <div class="p-20">
                <div class="contato-card"><strong>WhatsApp</strong><p>89 98125-9467</p></div>
                <div class="contato-card"><strong>E-mail</strong><p>eduardabrito044@gmail.com</p></div>
            </div>
        </section>
    </main>

    <button id="theme-btn" onclick="toggleTheme()">🌓</button>
    <script type="module" src="script.js"></script>
</body>
</html>
