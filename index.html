<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI José Marques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <header class="top-nav">
        <div class="header-main">
            <div class="brand">
                <img src="https://github.com/Eduardabrito044-ui/ouvidoriaescola/raw/main/logo.png" alt="Logo" class="mini-logo">
                <span class="school-name">CETI JM</span>
            </div>
            <nav class="nav-scroll">
                <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">Direct</button>
                <button id="btn-mural" onclick="mudarAba('mural')">Ideias</button>
                <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">Humor</button>
                <button id="btn-avisos" onclick="mudarAba('avisos')">Alertas</button>
                <button id="btn-cronograma" onclick="mudarAba('cronograma')">Agenda</button>
                <button id="btn-feedback" onclick="mudarAba('feedback')">Opinião</button>
                <button id="btn-contatos" onclick="mudarAba('contatos')">Contato</button>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="glass-container">
                <div id="feed-forum" class="feed"></div>
                <div class="footer-input">
                    <div id="reply-preview" class="reply-bar" style="display: none;">
                        <div class="reply-content"><small id="reply-user"></small><p id="reply-text"></p></div>
                        <button class="close-reply" onclick="cancelarResposta()">✕</button>
                    </div>
                    <div class="input-box">
                        <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                        <button class="send-icon" onclick="salvarMensagem()">➤</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div class="glass-container">
                <div id="feed-mural" class="feed"></div>
                <div class="footer-input">
                    <div class="input-box">
                        <input type="text" id="input-ideia" placeholder="Sua ideia de ouro...">
                        <button class="send-icon" onclick="salvarIdeia()">+</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="glass-container">
                <div class="header-inner"><h3>🎭 Como você está?</h3></div>
                <div class="content-scroll center-items">
                    <div class="emoji-grid">
                        <button onclick="enviarSentimento('Radiante', '😁')">😁<span>Radiante</span></button>
                        <button onclick="enviarSentimento('Bem', '🙂')">🙂<span>Bem</span></button>
                        <button onclick="enviarSentimento('Cansado', '😴')">😴<span>Cansado</span></button>
                        <button onclick="enviarSentimento('Triste', '😔')">😔<span>Triste</span></button>
                        <button onclick="enviarSentimento('Ansioso', '😰')">😰<span>Ansioso</span></button>
                        <button onclick="enviarSentimento('Estressado', '😤')">😤<span>Bravo</span></button>
                    </div>
                    <div id="status-sentimento"></div>
                </div>
            </div>
        </section>

        <section id="avisos" class="aba">
            <div class="glass-container">
                <div class="header-inner"><h3>📢 Alertas da Direção</h3> <button class="admin-btn" onclick="postarAviso()">📝</button></div>
                <div id="feed-avisos" class="feed"></div>
            </div>
        </section>

        <section id="cronograma" class="aba">
            <div class="glass-container">
                <div class="header-inner"><h3>📅 Cronograma</h3> <button class="admin-btn" onclick="editarCronograma()">⚙️</button></div>
                <div class="content-scroll">
                    <div class="tag-label olympic">🏆 OLIMPÍADAS</div>
                    <div id="cronograma-olimpiadas"></div>
                    <div class="tag-label school">🏫 EVENTOS GERAIS</div>
                    <div id="cronograma-eventos"></div>
                </div>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="glass-container">
                <div class="header-inner"><h3>✍️ Enviar Feedback</h3></div>
                <div class="content-scroll">
                    <textarea id="texto-feedback" placeholder="Sugestões ou críticas construtivas..."></textarea>
                    <button class="btn-primary" onclick="enviarFeedback()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="contatos" class="aba">
            <div class="glass-container">
                <div class="header-inner"><h3>📞 Fale com a Eduarda</h3></div>
                <div class="content-scroll">
                    <div class="card-modern blue"><strong>WhatsApp</strong><p>89 98125-9467</p></div>
                    <div class="card-modern green"><strong>E-mail</strong><p>Eduardabrito044@gmail.com</p></div>
                </div>
            </div>
        </section>
    </main>

    <button id="theme-toggle" onclick="toggleTheme()">🌑</button>
    <script type="module" src="script.js"></script>
</body>
</html>
